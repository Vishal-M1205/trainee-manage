<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
   <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/excite-bike/jquery-ui.css">
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../styles/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
     <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css">

<script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    
    <title>Training Management System</title>
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg ">
           <div class="navbar-brand ms-4  ">
                <h5 class="navbar-text m-0 fw-semibold"><span class="bi bi-union me-2"></span>Training Management System</h5>
           </div>
           <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navCollapse">
                <span class="navbar-toggler-icon"></span>
           </button>
           <div class="collapse navbar-collapse" id="navCollapse">
                   <ul class="navbar-nav ms-auto mx-3 align-items-center fs-6 fw-semibold">
                
                 <li class="ms-3 px-4 loginBtn py-2 rounded-pill cursor-pointer" data-bs-toggle="offcanvas" data-bs-target="#userOffcanvas">Hi <span id="nav-username"></span>!</li>
                 <li id="logout" class="ms-3 px-4 signupBtn py-2 rounded-pill cursor-pointer">Logout <span class="bi bi-door-open"></span></li>
                   </ul>
           </div>
        </nav>
    </header>
    <main>
    
<!-- =====================================================
     DASHBOARD STATISTICS SECTION
     Displays assigned, completed, started, and
     pending training counts for the employee.
===================================================== -->


        <section class="count container mt-5">
            <div class="row g-2 mx-lg-4">
                <div class="col-xl-3 col-md-6">
<div class="container-fluid rounded-4 bg-yellow-gradient count-card text-white py-4 ">
   <div class="d-flex justify-content-between align-items-center">
   <div class="d-flex flex-column ">
  <h5 class="m-0">Total</h5>
  <h4>Assigned</h4>
   </div>
   <h1 class="text-nowrap"><span class="bi bi-journal-bookmark-fill me-2"></span>
    <span id="courseCount"></span></h1>
   </div>
                    </div>
                </div>
                <div class="col-xl-3 col-md-6">
<div class="container-fluid rounded-4 bg-success-gradient count-card text-white py-4 ">
   <div class="d-flex justify-content-between align-items-center">
   <div class="d-flex flex-column">
  <h5 class="m-0">Courses</h5>
  <h4>Completed</h4>
   </div>
   <h1 class="text-nowrap"><span class="bi bi-check-circle-fill me-2"></span>
    <span id="compCount"></span></h1>
   </div>
                    </div>
                </div>
                <div class="col-xl-3 col-md-6">
<div class="container-fluid rounded-4 bg-blue-gradient count-card text-white py-4 ">
   <div class="d-flex justify-content-between align-items-center">
   <div class="d-flex flex-column">
  <h5 class="m-0">Courses</h5>
  <h4>Started</h4>
   </div>
   <h1 class="text-nowrap"><span class="bi bi-play-circle-fill me-2"></span>
    <span id="startCount"></span></h1>
   </div>
                    </div>
                </div>
                <div class="col-xl-3 col-md-6">
<div class="container-fluid rounded-4 bg-danger-gradient text-white py-4 count-card">
   <div class="d-flex justify-content-between align-items-center">
   <div class="d-flex flex-column">
  <h5 class="m-0">Courses</h5>
  <h4>Not Started</h4>
   </div>
   <h1 class="text-nowrap"><span class="bi bi-hourglass-split me-2"></span>
    <span id="notCount">4</span></h1>
   </div>
                    </div>
                </div>
              
            </div>
        </section>
         <!-- =====================================================
     TRAINING RECORDS SECTION
     Displays all assigned trainings with filtering,
     status updates, and view actions.
===================================================== -->
     
    <section class="container training mt-4 mb-5">
        <div class="row g-3 mx-lg-4">
       <div class="col-lg-12">
    <div class="container-fluid bg-light-subtle rounded-4 border-blue py-3">
<div class="d-flex justify-content-between align-items-center">
        <p class="m-0 fs-3 fw-semibold">Training Records</p>
       <!-- =====================================================
     TRAINING ACTION CONTROLS
     Filter, clear filter, all records, and completed
     records navigation controls.
===================================================== -->
               <div>
                <div class="btn-group">
               <button class="btn btn-blue" data-bs-toggle="modal" data-bs-target="#filterModal">Filter</button>
                 <button class="btn btn-danger text-nowrap " id="clrFilter" disabled>X</button>
                </div>
                
   <button class="btn btn-orange-gradinet px-4" id="allBtn">All</button>
        <button class="btn " id="completedBtn">Completed</button>
               </div>
                </div>
                <!-- =====================================================
     TRAINING RECORD CONTAINER
     Training cards are rendered dynamically through
     JavaScript.
===================================================== -->
                <div class="training-parent mt-5 row g-2" id="training-parent">
                    
                    
                  
                    
                </div>
           </div>
       </div>
        </div>
    </section>

    <!-- =====================================================
     TRAINING DETAILS MODAL
     Displays complete information about a selected
     training assignment.
===================================================== -->

<div class="modal fade" id="viewModal" >
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Training Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <div class="row g-3">

          <div class="col-md-6">
            <label class="fw-bold">Employee</label>
            <p id="viewEmployee"></p>
          </div>

          <div class="col-md-6">
            <label class="fw-bold">Status</label>
            <p id="viewStatus"></p>
          </div>

          <div class="col-md-6">
            <label class="fw-bold">Courses</label>
            <p id="viewCourses"></p>
          </div>

          <div class="col-md-6">
            <label class="fw-bold">Course Type</label>
            <p id="viewCourseType"></p>
          </div>

          <div class="col-md-6">
            <label class="fw-bold">Trainers</label>
            <p id="viewTrainers"></p>
          </div>

          <div class="col-md-6">
            <label class="fw-bold">Duration</label>
            <p id="viewDuration"></p>
          </div>

          <div class="col-md-6">
            <label class="fw-bold">Start Date</label>
            <p id="viewStartDate"></p>
          </div>

          <div class="col-md-6">
            <label class="fw-bold">End Date</label>
            <p id="viewEndDate"></p>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>

<!-- =====================================================
     TRAINING FILTER MODAL
     Allows filtering by training status and date
     range.
===================================================== -->

   <div class="modal fade" id="filterModal">
              <div class="modal-dialog ">
               <div class="modal-content">
                <div class="modal-header">
                   <h5>Apply filter</h5>
                   <button class="btn btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                   <label class="form-label" for="">Select Status</label>
                   <select class="form-select" name="filterStatus" id="filterStatus">
                    <option value=" ">Select a status</option>
                    <option value="Not Started">Not Started</option>
                    <option value="Started">Started</option>
                   </select>
                   <label class="form-label mt-2" for="">Start Date</label>
                   <input class="form-control" type="date" id="filterStart">
                   <label class="form-label mt-2" for="">End Date</label>
                   <input class="form-control" type="date" id="filterEnd">
                </div>
                <div class="modal-footer">
                <button class="btn btn-primary" id="filterApplyBtn">Apply</button>
                </div>
               </div>
              </div>
          </div>

    </main>

    <!-- =====================================================
     USER PROFILE OFFCANVAS
     Displays logged-in employee profile information.
===================================================== -->

 <div class="offcanvas offcanvas-start" id="userOffcanvas">
    <div class="offcanvas-header border-bottom">
        <h5 class="offcanvas-title">User Details</h5>
        <button type="button"
                class="btn-close"
                data-bs-dismiss="offcanvas">
        </button>
    </div>

    <div class="offcanvas-body">
        <div class="container-fluid">

            <div class="text-center mb-4">
                <i class="bi bi-person-circle fs-1"></i>
                <h4 id="userName"></h4>
                <span class="badge bg-primary" id="userRole"></span>
            </div>

            <div class="row g-3">

                <div class="col-12">
                    <label class="fw-bold">Email</label>
                    <p id="userEmail" class="mb-0"></p>
                </div>

                <div class="col-6">
                    <label class="fw-bold">Gender</label>
                    <p id="userGender" class="mb-0"></p>
                </div>

                <div class="col-6">
                    <label class="fw-bold">DOB</label>
                    <p id="userDob" class="mb-0"></p>
                </div>

                <div class="col-12">
                    <label class="fw-bold">Department</label>
                    <p id="userDepartment" class="mb-0"></p>
                </div>

                <div class="col-12">
                    <label class="fw-bold">Designation</label>
                    <p id="userDesignation" class="mb-0">
                        
                    </p>
                </div>

                <div class="col-12">
                    <label class="fw-bold">Role</label>
                    <p id="userRoleText" class="mb-0"></p>
                </div>

            </div>

        </div>
    </div>
</div>

    <script src="../scripts/userDash.js"></script>
</body>
</html>
