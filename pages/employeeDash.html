<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
   <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/excite-bike/jquery-ui.css">
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../styles/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
     <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css">

<script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <title>Training Management System</title>
</head>
<body>
    <header>
      <!-- Navbar Section --->
        <nav class="navbar navbar-expand-lg ">
           <div class="navbar-brand ms-4  ">
                <h5 class="navbar-text m-0 fw-semibold"><span class="bi bi-union me-2"></span>Training Management System</h4>
           </div>
           <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navCollapse">
                <span class="navbar-toggler-icon"></span>
           </button>
           <div class="collapse navbar-collapse" id="navCollapse">
                   <ul class="navbar-nav ms-auto mx-3 align-items-center fs-6 fw-semibold">
                 
                 <li class="ms-3 px-4 loginBtn py-2 rounded-pill cursor-pointer" data-bs-toggle="offcanvas" data-bs-target="#userOffcanvas" >Hi <span id="nav-username"></span>!</li>
                 <li id="logout" class="ms-3 px-4 signupBtn py-2 rounded-pill cursor-pointer">Logout <span class="bi bi-door-open"></span></li>
                   </ul>
           </div>
        </nav>
    </header>
    <main>
      <!-- =====================================================
     DASHBOARD STATISTICS SECTION
     Displays training progress metrics, employee count,
     trainer count, and course count.
===================================================== -->
        <section class="stats container mt-5" >
           <div class="row g-3 mx-lg-4">
               <div class="col-lg-8 col-12"  >
        <div class="container-fluid shadow-sm rounded-5 shadow-lg border-orange d-flex flex-column gap-2 py-4 px-4" >
          <div class="d-flex gap-2 flex-md-row flex-column">
             <div class="d-flex flex-column gap-2 border blue-gradient px-3 py-4 rounded-4 shadow-sm w-100">
           <div class="d-flex align-items-center gap-2 text-orange">
            <span class="bi bi-mortarboard fs-2"></span>
            <h3  class="m-0" id="totalAssign"></h3>
            <h5 class="m-0 mx-2">Courses Assigned</h5>

           </div>
          
            <div class="progress" style="height: 10px;">
              <div class="progress-bar bg-orange" style="width: 100%;"></div>
            </div>
        </div>
             <div class="d-flex flex-column gap-2 border blue-gradient  px-3 py-4 rounded-4 shadow-sm w-100">
           <div class="d-flex align-items-center gap-2 text-success">
            <span class="bi bi-check-circle fs-2"></span>
            <h3 class="m-0" id="completed"></h3>
            <h5 class="m-0 mx-2">Courses Completed</h5>

           </div>
          
            <div class="progress" style="height: 10px;">
              <div class="progress-bar bg-success" id="compBar" ></div>
            </div>
        </div>
          </div>
        
        <div class="d-flex flex-column gap-2 border blue-gradient  px-3 py-4 rounded-4 shadow-sm">
           <div class="d-flex align-items-center gap-2 text-blue">
            <span class="bi bi-play-circle fs-2"></span>
            <h3 class="m-0" id="started"></h3>
            <h5 class="m-0 mx-2">Courses Started</h5>

           </div>
          
            <div class="progress" style="height: 10px;">
              <div class="progress-bar bg-blue" id="startBar"></div>
            </div>
        </div>
        <div class="d-flex flex-column gap-2 border blue-gradient  px-3 py-4 rounded-4 shadow-sm">
           <div class="d-flex align-items-center gap-2 text-danger">
            <span class="bi bi-clock fs-2"></span>
            <h3 class="m-0" id="notstarted"></h3>
            <h5 class="m-0 mx-2">Courses Not-Started</h5>

           </div>
          
            <div class="progress" style="height: 10px;">
              <div class="progress-bar bg-danger" id="notBar"></div>
            </div>
        </div>
       
        
        </div>
               </div>
               <div class="col-lg-4 col-12 ">
                    <div class="container-fluid d-flex flex-lg-column align-items-center justify-content-center py-2 flex-md-row flex-column gap-2">
<div class="container-fluid rounded-4 count-card  bg-danger-gradient text-white py-4">
   <div class="d-flex justify-content-between align-items-center">
   <div class="d-flex flex-column ms-lg-3">
  <h5 class="m-0">Total</h5>
  <h4>Employees</h4>
   </div>
   <h1 class="text-nowrap me-lg-3"><span class="bi bi-people me-2"></span>
    <span id="empCount"></span></h1>
   </div>
                    </div>
<div class="container-fluid rounded-4 bg-success-gradient text-white py-4 count-card">
   <div class="d-flex justify-content-between align-items-center">
   <div class="d-flex flex-column ms-lg-3">
  <h5 class="m-0">Total</h5>
  <h4>Trainers</h4>
   </div>
   <h1 class="text-nowrap me-lg-3"><span class="bi bi-person-video3 me-2"></span><span id="trainCount"></span></h1>
   </div>
                    </div>
<div class="container-fluid rounded-4 bg-blue-gradient text-white py-4 count-card">
   <div class="d-flex justify-content-between align-items-center" >
   <div class="d-flex flex-column ms-lg-3">
  <h5 class="m-0">Total</h5>
  <h4>Courses</h4>
   </div>
   <h1 class="text-nowrap me-lg-3"><span class="bi bi-journal-bookmark me-2 "></span><span id="courseCount"></span></h1>
   </div>
                    </div>
                    </div>
               </div>
           </div>
        </section>
<!-- =====================================================
     TRAINING MANAGEMENT SECTION
     Contains training records, filters, assignment,
     history, and training actions.
===================================================== -->

        <section class="details container mt-4 mb-5 " >
               <div class="row g-3 mx-lg-4" >
                <!-- =====================================================
     TRAINING ACTION CONTROLS
     Filter, clear filter, all records, and completed
     records navigation controls.
===================================================== -->

                 <div class="col-lg-2">
       <div class="container-fluid border-orange rounded-4 shadow-sm bg-light-subtle d-flex flex-lg-column flex-row align-items-center justify-content-center  py-3 sticky-top" style="top: 2%;">
  
       <div class="d-flex flex-lg-column flex-row gap-3">
        
          <button class="btn btn-blue" data-bs-toggle="modal" data-bs-target="#filterModal">Filter</button>
          
          <button class="btn btn-danger text-nowrap d-none" id="clrFilter">Clear filter</button>
       
           <button class="btn btn-orange-gradinet" id="allBtn">All</button>
        <button class="btn " id="completedBtn">Completed</button>
       </div>
       </div>
                 </div>
                 <div class="col-lg-10 ">
               <div class="container-fluid bg-light-subtle rounded-4 border-blue py-3" >
                <div class="d-flex justify-content-between align-items-center">
                 <p class="m-0 fs-5 fw-semibold">Training Records</p>
                 <div class="d-flex gap-1">
                  <button class="btn btn-blue" id="histBtn" data-bs-toggle="modal" data-bs-target="#histModal" >History</button>
                  <button class="btn btn-blue" data-bs-toggle="modal" data-bs-target="#assignModal" id="assignModalBtn" >Assign +</button>
                 </div>
                </div>
<!-- =====================================================
     TRAINING HISTORY MODAL
     Displays soft-deleted training records and
     provides restore/delete actions.
===================================================== -->
      <div class="modal fade" id="histModal">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Training History</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <div class="row g-3" id="historyParent"></div>
            </div>

        </div>
    </div>
</div>
<!-- =====================================================
     ASSIGN TRAINING MODAL
     Allows administrators to assign courses,
     trainers, employees, and schedule dates.
===================================================== -->
                  <div class="modal fade" id="assignModal">
                      <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
                          <div class="modal-content px-3 py-2">
                            <div class="modal-header">
                               <h4>Assign Training</h4>
                               <button class="btn btn-close ms-auto" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                              <form id="assignModalForm"> 
                                <label class="form-label" for="course">Select Courses</label>
                               <select class="form-select" name="course" id="course" multiple>         
                               </select>

                               <label class="form-label" for="trainer">Select Trainer</label>
                               <select class="form-select" name="trainer" id="trainer" multiple>
                               </select>

                               <label class="form-label" for="employee">Select Employee</label>
                               <select class="form-select" name="employee" id="employee" >
                               </select>

                               <label class="form-label mt-3" for="">Course Type</label>
                               <select class="form-select" name="ctype" id="ctype">
                                <option value="Offline">Offline</option>
                                <option value="Online">Online</option>
                               </select>

                             
                               <label class="form-label mt-3" for="startDate">Start Date</label>
                               <input class="form-control" type="date" id="startDate" onkeydown="return false;"  >
                               <label class="form-label mt-3" for="endDate">End Date</label>
                               <input class="form-control" type="date" id="endDate" onkeydown="return false;"  >
                              </form>
                              
                            </div>
                            <div class="modal-footer">
                           <button class="btn btn-orange" id="assignSubmit">Submit</button>
                            </div>
                          </div>  
                      </div>
                  </div>
<!-- =====================================================
     UPDATE TRAINING MODAL
     Used to edit existing training assignments.
===================================================== -->

                   <div class="modal fade" id="updateModal">
                      <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
                          <div class="modal-content px-3 py-2">
                            <div class="modal-header">
                               <h4>Update Training</h4>
                               <button class="btn btn-close ms-auto" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                              <form id="updateModalForm"> 
                                <label class="form-label" for="course">Select Courses</label>
                               <select class="form-select" name="course" id="updateCourse" multiple>         
                               </select>

                               <label class="form-label" for="trainer">Select Trainer</label>
                               <select class="form-select" name="trainer" id="updateTrainer" multiple>
                               </select>

                               <label class="form-label" for="employee">Select Employee</label>
                               <select class="form-select" name="employee" id="updateEmployee" >
                               </select>

                               <label class="form-label mt-3" for="">Course Type</label>
                               <select class="form-select" name="ctype" id="updateCtype">
                                <option value="Offline">Offline</option>
                                <option value="Online">Online</option>
                               </select>

                              
                               <label class="form-label mt-3" for="startDate">Start Date</label>
                               <input class="form-control" type="date" id="updateStartDate" onkeydown="return false;"  >
                               <label class="form-label mt-3" for="endDate">End Date</label>
                               <input class="form-control" type="date" id="updateEndDate" onkeydown="return false;"  >
                              </form>
                              
                            </div>
                            <div class="modal-footer">
                           <button class="btn btn-orange" id="updateSubmit">Submit</button>
                            </div>
                          </div>  

  


                      </div>
                  </div>

<!-- =====================================================
     TRAINING DETAILS MODAL
     Displays complete information about a selected
     training assignment.
===================================================== -->

<div class="modal fade" id="viewModal" >
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Training Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <div class="row g-3">

          <div class="col-md-6">
            <label class="fw-bold">Employee</label>
            <p id="viewEmployee"></p>
          </div>

          <div class="col-md-6">
            <label class="fw-bold">Status</label>
            <p id="viewStatus"></p>
          </div>

          <div class="col-md-6">
            <label class="fw-bold">Courses</label>
            <p id="viewCourses"></p>
          </div>

          <div class="col-md-6">
            <label class="fw-bold">Course Type</label>
            <p id="viewCourseType"></p>
          </div>

          <div class="col-md-6">
            <label class="fw-bold">Trainers</label>
            <p id="viewTrainers"></p>
          </div>

          <div class="col-md-6">
            <label class="fw-bold">Duration</label>
            <p id="viewDuration"></p>
          </div>

          <div class="col-md-6">
            <label class="fw-bold">Start Date</label>
            <p id="viewStartDate"></p>
          </div>

          <div class="col-md-6">
            <label class="fw-bold">End Date</label>
            <p id="viewEndDate"></p>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
<!-- =====================================================
     PARENT SECTION
   parent for the training cards which is dynamically typed using JS.
===================================================== -->
                <div class="train-parent mt-5 row g-2" id="train-parent">
                    
                    
                  
                    
                </div>
                 
               </div>
                 </div>
               </div>
        </section>
    </main>

<!-- =====================================================
     FILTER MODAL
     Filters training records by status and date range.
===================================================== -->

<div class="modal fade" id="filterModal">
              <div class="modal-dialog ">
               <div class="modal-content">
                <div class="modal-header">
                   <h5>Apply filter</h5>
                   <button class="btn btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                   <label class="form-label" for="">Select Status</label>
                   <select class="form-select" name="filterStatus" id="filterStatus">
                    <option value=" ">Select a status</option>
                    <option value="Not Started">Not Started</option>
                    <option value="Started">Started</option>
                   </select>
                   <label class="form-label mt-2" for="">Start Date</label>
                   <input class="form-control" type="date" id="filterStart">
                   <label class="form-label mt-2" for="">End Date</label>
                   <input class="form-control" type="date" id="filterEnd">
                </div>
                <div class="modal-footer">
                <button class="btn btn-orange" id="filterApplyBtn">Apply</button>
                </div>
               </div>
              </div>
          </div>

<!-- =====================================================
     USER PROFILE OFFCANVAS
     Displays logged-in employee information.
===================================================== -->
    <div class="offcanvas offcanvas-start" id="userOffcanvas">
    <div class="offcanvas-header border-bottom">
        <h5 class="offcanvas-title">User Details</h5>
        <button type="button"
                class="btn-close"
                data-bs-dismiss="offcanvas">
        </button>
    </div>

    <div class="offcanvas-body">
        <div class="container-fluid">

            <div class="text-center mb-4">
                <i class="bi bi-person-circle fs-1"></i>
                <h4 id="userName"></h4>
                <span class="badge bg-primary" id="userRole"></span>
            </div>

            <div class="row g-3">

                <div class="col-12">
                    <label class="fw-bold">Email</label>
                    <p id="userEmail" class="mb-0"></p>
                </div>

                <div class="col-6">
                    <label class="fw-bold">Gender</label>
                    <p id="userGender" class="mb-0"></p>
                </div>

                <div class="col-6">
                    <label class="fw-bold">DOB</label>
                    <p id="userDob" class="mb-0"></p>
                </div>

                <div class="col-12">
                    <label class="fw-bold">Department</label>
                    <p id="userDepartment" class="mb-0"></p>
                </div>

                <div class="col-12">
                    <label class="fw-bold">Designation</label>
                    <p id="userDesignation" class="mb-0">
                        
                    </p>
                </div>

                <div class="col-12">
                    <label class="fw-bold">Role</label>
                    <p id="userRoleText" class="mb-0"></p>
                </div>

            </div>

        </div>
    </div>
</div>

    <script src="../scripts/empDash.js"></script>
</body>
</html>
